services:
  redpanda:
    image: redpandadata/redpanda:v24.2.12
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - "PLAINTEXT://0.0.0.0:9092"
      - --advertise-kafka-addr
      - "PLAINTEXT://redpanda:9092"
      - --pandaproxy-addr
      - "PLAINTEXT://0.0.0.0:8082"
      - --advertise-pandaproxy-addr
      - "PLAINTEXT://redpanda:8082"
    ports:
      - "9092:9092"
      - "8082:8082"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--api-urls", "localhost:9644"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: redpandadata/console:v2.6.1
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: "redpanda:9092"
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: cloudops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d cloudops"]
      interval: 3s
      timeout: 3s
      retries: 10

  ingest-service:
    build:
      context: ./services/ingest-service
    ports:
      - "8001:8001"
    environment:
      KAFKA_BROKER: "redpanda:9092"
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  detection-service:
    build:
      context: ./services/detection-service
    ports:
      - "8002:8002"
    environment:
      KAFKA_BROKER: "redpanda:9092"
      PG_DSN: "postgresql://app:app@postgres:5432/cloudops"
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: "dev-secret-change-me-in-prod"
      INGEST_URL: "http://ingest-service:8001"
      DETECTION_URL: "http://detection-service:8002"
      RATE_LIMIT_RPM: "60"
    depends_on:
      ingest-service:
        condition: service_healthy
      detection-service:
        condition: service_healthy

  dashboard-service:
    build:
      context: ./services/dashboard-service
    ports:
      - "8003:8003"
    environment:
      DETECTION_URL: "http://detection-service:8002"
    depends_on:
      detection-service:
        condition: service_healthy

  agentic-engine:
    build:
      context: ./services/agentic-engine
    ports:
      - "8004:8004"
    environment:
      VECTOR_KB_URL: "http://vector-kb:8005"
      DETECTION_URL: "http://detection-service:8002"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    depends_on:
      detection-service:
        condition: service_healthy

  vector-kb:
    build:
      context: ./services/vector-kb
    ports:
      - "8005:8005"
    environment:
      CHROMA_PERSIST_DIR: "/data/chroma"
      CHROMA_EPHEMERAL: "false"
    volumes:
      - chroma_data:/data/chroma

  remediation-service:
    build:
      context: ./services/remediation-service
    ports:
      - "8006:8006"
    environment:
      DETECTION_URL: "http://detection-service:8002"
    depends_on:
      detection-service:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: "postgresql://app:app@postgres:5432/cloudops"
      MLFLOW_DEFAULT_ARTIFACT_ROOT: "/mlflow/artifacts"
    ports:
      - "5001:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://app:app@postgres:5432/cloudops
      --default-artifact-root /mlflow/artifacts

volumes:
  pgdata:
  mlflow_artifacts:
  chroma_data:
  prometheus_data:
  grafana_data:
