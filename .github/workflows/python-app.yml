name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ruff black

      - name: Ruff lint
        run: ruff check services/ scripts/

      - name: Black format check
        run: black --check services/ scripts/

  test-ingest:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Poetry virtualenvs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.virtualenvs
          key: ${{ runner.os }}-poetry-ingest-${{ hashFiles('services/ingest-service/pyproject.toml') }}

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create false

      - name: Install dependencies
        run: |
          cd services/ingest-service
          poetry install --no-interaction --no-root

      - name: Run tests
        run: |
          cd services/ingest-service
          python -m pytest tests/ -v

  test-detection:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Poetry virtualenvs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.virtualenvs
          key: ${{ runner.os }}-poetry-detection-${{ hashFiles('services/detection-service/pyproject.toml') }}

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create false

      - name: Install dependencies
        run: |
          cd services/detection-service
          poetry install --no-interaction --no-root

      - name: Run tests
        run: |
          cd services/detection-service
          python -m pytest tests/ -v

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit SAST scan
        run: bandit -r services/ -ll -ii

      - name: Check for secrets in code
        run: |
          # Simple grep-based secrets check
          if grep -rn "password\s*=\s*['\"]" services/ scripts/ --include="*.py" | grep -v "POSTGRES_PASSWORD" | grep -v "test" | grep -v "#"; then
            echo "ERROR: Possible hardcoded secrets found"
            exit 1
          else
            echo "No hardcoded secrets detected"
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-ingest, test-detection]
    steps:
      - uses: actions/checkout@v4

      - name: Build ingest-service image
        run: docker build -t ingest-service:test services/ingest-service/

      - name: Build detection-service image
        run: docker build -t detection-service:test services/detection-service/
